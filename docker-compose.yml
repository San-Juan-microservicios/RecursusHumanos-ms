version: '3'


services:
  recursosHumanos-db:
    container_name: recursosHumanos_database
    image: postgres:16.2
    restart: always
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
      - 5434:5432
    environment:
      - POSTGRES_USER=postgresrrhh
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=recursosHumanosdb